<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ewelinas Oase</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Cormorant Garamond", Georgia, serif;
      background: #fff;
      height: 100vh;
    }

    .chat-toggle {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      background: #e8006f;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      transition: background 0.2s;
      z-index: 1000;
    }

    .chat-toggle:hover {
      background: #c70060;
    }

    .chat-toggle svg {
      width: 26px;
      height: 26px;
      fill: #fff;
    }

    .chat-widget {
      position: fixed;
      bottom: 92px;
      right: 24px;
      width: 300px;
      height: 400px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      display: none;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #eee;
      z-index: 1000;
    }

    .chat-widget.open {
      display: flex;
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: #fff;
      border-bottom: 1px solid #eee;
    }

    .chat-header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #e8006f;
      letter-spacing: 1px;
    }

    .chat-header button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      color: #999;
      line-height: 1;
      padding: 0 2px;
    }

    .chat-header button:hover {
      color: #e8006f;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #fff;
    }

    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: #ddd;
      border-radius: 2px;
    }

    .message {
      max-width: 85%;
      padding: 8px 12px;
      line-height: 1.4;
      font-size: 15px;
      white-space: pre-wrap;
      border-radius: 4px;
    }

    .message.user {
      align-self: flex-end;
      background: #e8006f;
      color: #fff;
    }

    .message.assistant {
      align-self: flex-start;
      background: #f3f3f3;
      color: #333;
    }

    .message.typing {
      font-style: italic;
      color: #999;
    }

    .chat-input {
      display: flex;
      padding: 10px;
      border-top: 1px solid #eee;
      gap: 8px;
      background: #fff;
      align-items: center;
    }

    .chat-input input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      font-family: "Cormorant Garamond", Georgia, serif;
      outline: none;
    }

    .chat-input input::placeholder {
      color: #bbb;
    }

    .chat-input input:focus {
      border-color: #e8006f;
    }

    .chat-input button {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
    }

    .chat-input button svg {
      width: 22px;
      height: 22px;
      fill: #e8006f;
      transition: fill 0.2s;
    }

    .chat-input button:hover svg {
      fill: #c70060;
    }

    .chat-input button:disabled svg {
      fill: #f0a0c0;
    }
  </style>
</head>
<body>

  <button class="chat-toggle" id="toggle">
    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.2L4 17.2V4h16v12z"/></svg>
  </button>

  <div class="chat-widget" id="widget">
    <div class="chat-header">
      <h1>Ewelinas Oase</h1>
      <button id="close">&times;</button>
    </div>
    <div class="chat-messages" id="messages">
      <div class="message assistant">Willkommen bei Ewelinas Oase! Wie kann ich Ihnen helfen?</div>
    </div>
    <div class="chat-input">
      <input type="text" id="input" placeholder="Ihre Nachricht..." autocomplete="off">
      <button id="send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <script>
    const widget = document.getElementById("widget");
    const toggleBtn = document.getElementById("toggle");
    const closeBtn = document.getElementById("close");
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const chatHistory = [];

    toggleBtn.addEventListener("click", () => {
      widget.classList.toggle("open");
      if (widget.classList.contains("open")) inputEl.focus();
    });

    closeBtn.addEventListener("click", () => {
      widget.classList.remove("open");
    });

    function addMessage(text, role) {
      const div = document.createElement("div");
      div.className = `message ${role}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = "";
      addMessage(text, "user");
      chatHistory.push({ role: "user", content: text });

      sendBtn.disabled = true;
      const typingEl = addMessage("Schreibt...", "assistant typing");

      try {
        const res = await fetch("/.netlify/functions/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: chatHistory }),
        });

        const data = await res.json();

        if (data.error) throw new Error(data.error);

        typingEl.remove();
        addMessage(data.reply, "assistant");
        chatHistory.push({ role: "assistant", content: data.reply });
      } catch (err) {
        typingEl.remove();
        addMessage("Fehler: " + err.message, "assistant");
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
