name = "ewelinas-oase-chatbot"
pages_build_output_dir = "public"
compatibility_date = "2024-12-01"

# ── Rate-Limiting (v2.4) ────────────────────────────────────────
# Ohne Binding läuft der Chat weiter (fail-open + Warn-Log).
# Aktivieren:
#   1. Cloudflare Dashboard → Workers & Pages → KV → Create Namespace
#      (Name: "rate-limit-ewelinas-oase")
#   2. Namespace-ID hier eintragen, Kommentar-# entfernen
#   3. Optional: Env-Vars RATE_LIMIT_MAX / RATE_LIMIT_WINDOW setzen
#      (Defaults: 20 Requests / 3600s pro IP+Client)
#
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "997293493b7a4a87b9a8d2c577a192bb"